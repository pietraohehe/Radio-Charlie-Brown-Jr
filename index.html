<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Rádio Charlie Brawn Jr</title>
</head>
<body>
    <main>
        <div class="fundo">
            <div class="background">
            
                <div class="content">

                <audio id="player" src=""></audio>

                <!-- Seção do texto da rádio -->
                <div class="nameradio">
                     <h5 class="txtall">Rádio Charlie Brawn Jr</h5>
                </div>

                <!-- Seção da Imagem -->
                <div class="imgmusic">
                    <img id="fotomusic" width="270" height="270">
                </div>
 
                <!-- Seção do nome -->
                <div class="data">
                    <h3  id="namemusic"></h3>
                    <h4 id="autormusic"></h4>
                </div>

                <!-- Seção da barra de progresso da música -->
                <div class="divprogressbar">
                    
                    <div class="progressbar">
                        <div class="progress"></div>
                    </div>
                    
                </div>

                <div class="contentTime">
                    <div class="timemusic">
                        <span class="timeinicial">0:00</span>
                        <span class="timefinal">0:00</span>
                    </div>
                    
                </div>
                

                <!-- Seção dos botões de interação -->
                <div class="buttons">
                    <button class="bt" id="back" ><i class="material-symbols-outlined">fast_rewind</i></button>
                    <button class="bt" id="play"><i class="material-symbols-outlined">play_arrow</i></button>
                    <button class="bt" id="next" ><i class="material-symbols-outlined">fast_forward</i></button>
                </div>

                </div>
            </div>
       </div> 
    </main>
    <script type="module" src="./script.js"></script>
</body>

</html>
