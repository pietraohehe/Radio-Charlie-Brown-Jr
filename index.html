<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Rádio Charlie Brawn Jr</title>
</head>
<body>
    <main>
        <img class="imgfundo" src="imgmusic.jpg" alt="imgmusic">
        <div class="background">
            
            <div><audio id="player" controls><source src="Zoio de Lula.mp3" type="audio/mpeg"></audio></div>
            <div class="content">

                <!-- Seção do texto da rádio -->
                <div class="nameradio">
                     <h5 class="txtall">Rádio Charlie Brawn Jr</h5>
                </div>

                <!-- Seção da Imagem -->
                <div class="imgmusic">
                    <img class="fotomusic" id="fotomusic" src="imgmusic.jpg" alt="imgmusic" width="270" height="270">
                </div>
 
                <!-- Seção do nome -->
                <div class="data">
                    <h3 class="txtall" id="namemusic">Zóio de Zula</h3>
                    <h4 class="txtall" id="autormusic">Charlie Brawn Jr.</h4>
                </div>

                <!-- Seção da barra de progresso da música -->
                <div class="divprogressbar">
                    
                    <div class="progressbar">
                        <div class="progress"></div>
                    </div>
                    
                </div>

                <div class="contentTime">
                    <div class="timemusic">
                        <span class="timeinicial">00:00</span>
                        <span class="timefinal">00:00</span>
                    </div>
                    
                </div>
                

                <!-- Seção dos botões de interação -->
                <div class="buttons">
                    <button class="bt" id="back"><i class="material-symbols-outlined">fast_rewind</i></button>
                    <button class="bt" id="play"><i class="material-symbols-outlined">play_arrow</i></button>
                    <button class="bt" id="next"><i class="material-symbols-outlined">fast_forward</i></button>
                </div>

            </div>
        </div>
    </main>
    <script type="module" src="./script.js"></script>
</body>

</html>
